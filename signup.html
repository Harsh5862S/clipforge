<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign up — ClipForge</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg0:#09090f; --bg1:#0f0f1a; --bg3:#1a1a30;
    --border:rgba(120,100,255,0.15); --borderB:rgba(120,100,255,0.38);
    --purple:#7c6dfa; --pt:#a99bff; --t0:#f0eeff; --t1:#a8a0cc; --t2:#6a6490;
  }
  body { background:var(--bg0); color:var(--t0); font-family:'Inter',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
  .card { background:var(--bg1); border:0.5px solid var(--border); border-radius:16px; padding:2.5rem; width:100%; max-width:380px; }
  .logo { font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:700; text-align:center; margin-bottom:0.4rem; }
  .logo span { color:var(--purple); }
  h1 { font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:600; text-align:center; color:var(--t1); margin-bottom:1.8rem; }
  label { font-size:12px; color:var(--t2); display:block; margin-bottom:6px; }
  input { width:100%; height:42px; background:var(--bg3); border:0.5px solid var(--borderB); border-radius:9px; padding:0 13px; color:var(--t0); font-size:14px; margin-bottom:1.1rem; outline:none; }
  input:focus { border-color:var(--purple); box-shadow:0 0 0 3px rgba(124,109,250,0.12); }
  button { width:100%; height:44px; background:var(--purple); color:#fff; border:none; border-radius:9px; font-family:'Space Grotesk',sans-serif; font-size:14px; font-weight:600; cursor:pointer; margin-top:0.4rem; }
  button:hover { background:#6a5ce8; }
  button:disabled { opacity:0.5; cursor:default; }
  .err { background:rgba(220,50,50,0.08); border:0.5px solid rgba(220,50,50,0.3); border-radius:9px; padding:10px 13px; font-size:13px; color:#f08080; margin-bottom:1rem; display:none; }
  .foot { text-align:center; margin-top:1.4rem; font-size:13px; color:var(--t2); }
  .foot a { color:var(--pt); text-decoration:none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Clip<span>Forge</span></div>
  <h1>Create your account</h1>
  <div class="err" id="err"></div>
  <form id="form">
    <label for="email">Email</label>
    <input type="email" id="email" required placeholder="you@example.com" />
    <label for="password">Password</label>
    <input type="password" id="password" required placeholder="At least 8 characters" minlength="8" />
    <button type="submit" id="btn">Create account</button>
  </form>
  <div class="foot">Already have an account? <a href="/login">Log in</a></div>
</div>
<script>
  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const errEl = document.getElementById('err');
    errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Creating…';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const resp = await fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error?.message || 'Signup failed');
      window.location.href = '/verify-otp?email=' + encodeURIComponent(email) + '&purpose=signup';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Create account';
    }
  });
</script>
</body>
</html>
